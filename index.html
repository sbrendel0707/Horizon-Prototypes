<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nelnet Prototypes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #0a1628;
  color: #f1f5f9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}
p {
  color: #64748b;
  font-size: 14px;
  margin-bottom: 40px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  width: 100%;
  max-width: 900px;
}
a {
  display: block;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px;
  padding: 24px;
  text-decoration: none;
  color: inherit;
  transition: background .15s, border-color .15s;
}
a:hover {
  background: rgba(255,255,255,.09);
  border-color: rgba(37,99,235,.5);
}
.label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .7px;
  color: #2563eb;
  font-weight: 600;
  margin-bottom: 8px;
}
.title {
  font-size: 16px;
  font-weight: 600;
  color: #f1f5f9;
  line-height: 1.4;
}
</style>
</head>
<body>
  <h1>Nelnet Prototypes</h1>
  <p>Select a prototype to preview</p>
  <div class="grid">
    <a href="/University Implementation Flow.html">
      <div class="label">Institution Full Admin</div>
      <div class="title">Implementation Flow</div>
    </a>
    <a href="/User feedback complete student experience.html">
      <div class="label">Student</div>
      <div class="title">Complete Student Flow</div>
    </a>
    <a href="/UI_ Charges added after pay over time plan exists - student and student plan owner.html">
      <div class="label">Student Second Login</div>
      <div class="title">Charges Added After Pay Over Time Plan Is Setup</div>
    </a>
  </div>
</body>
</html>
